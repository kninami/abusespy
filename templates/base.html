<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}AbuseSpy{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a href="{{ url_for('index') }}" class="logo">
        <span class="logo-icon">🛡️</span>
        <span class="logo-text">AbuseSpy</span>
      </a>
      <nav class="site-nav">
        <a href="{{ url_for('index') }}">플랫폼 목록</a>
        <a href="#about">소개</a>
      </nav>
    </div>
  </header>

  <main>
    {% block content %}{% endblock %}
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>
        AbuseSpy는 소셜 미디어 플랫폼의 학대·피해 대응 정책을 공개적으로 평가합니다.
        <a href="https://privacyspy.org" target="_blank" rel="noopener">PrivacySpy</a>에서 영감을 받았습니다.
      </p>
      <p class="footer-note">본 평가는 각 플랫폼의 공개 정책 문서를 기반으로 하며, 실제 집행 여부를 보증하지 않습니다.</p>
      <p class="footer-credit">제작: 도토리랩스 x 서울여대 여성연구소</p>
    </div>
  </footer>
</body>
</html>
